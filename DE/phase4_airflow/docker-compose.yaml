services:
  postgres-airflow:
    image: postgres:15
    environment: 
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    restart: unless-stopped
  
  de-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: de_db
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    restart: unless-stopped

  airflow-webserver:
    image: kartheek-airflow:2.9.0-celery
    env_file: .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ../phase3:/opt/airflow/phase3
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - postgres-airflow

  airflow-scheduler:
    image: kartheek-airflow:2.9.0-celery
    env_file: .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ../phase3:/opt/airflow/phase3
    command: scheduler
    depends_on:
      - airflow-webserver

  airflow-worker:
    image: kartheek-airflow:2.9.0-celery
    env_file: .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ../phase3:/opt/airflow/phase3
    command: celery worker
    depends_on:
      - airflow-scheduler

  airflow-triggerer:
    image: kartheek-airflow:2.9.0-celery
    env_file: .env
    volumes:
      - ./dags:/opt/airflow/dags
      - ../phase3:/opt/airflow/phase3
    command: triggerer
    depends_on:
      - airflow-scheduler
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped